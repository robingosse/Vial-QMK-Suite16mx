name: Build Custom Keyboard Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container: qmkfm/qmk_cli

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sanity check keyboard files
        run: |
          echo "=== keyboard.json ==="
          cat keyboards/opendeck/32/rev1/keyboard.json
      
          echo "=== parent info.json ==="
          cat keyboards/opendeck/32/info.json
      
          echo "=== keymap config.h ==="
          cat keyboards/opendeck/32/rev1/keymaps/vial/config.h
      
          echo "=== vial.json ==="
          cat keyboards/opendeck/32/rev1/keymaps/vial/vial.json
      
          echo "=== keymap rules.mk ==="
          cat keyboards/opendeck/32/rev1/keymaps/vial/rules.mk

      - name: Mark repo as safe
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Compile opendeck 32 default
        run: |
          make opendeck/32/rev1:vial

      - name: List build output
        run: |
          find .build -type f || true

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: suite16mx-test-firmware
          path: |
            .build/*.uf2
            .build/*.hex
            .build/*.bin
            *.uf2
            *.hex
            *.bin
